{% extends "base.html" %}

{% block content %}
<div class="glass-panel">
    <header class="page-header">
        <div class="header-content">
            <h1>Multi Find <span>Relevant & Irrelevant</span> Link</h1>
            <p class="subtitle">Wizikey Product Analysis</p>
        </div>
    </header>

    <!-- Input Section -->
    <section class="input-panel">
        <div class="form-group">
            <label for="keywords"><i class="fa-solid fa-tag"></i> Target Keywords (Who?)</label>
            <input type="text" id="keywords" placeholder="e.g. AI, Automation, Python"
                value="PRADAN's, Professional Assistance for Development Action, Pradan">
        </div>

        <div class="form-group">
            <label for="context_keywords"><i class="fa-solid fa-filter"></i> Context Keywords (Optional - What?)</label>
            <input type="text" id="context_keywords" placeholder="e.g. NGO, Rural, Development, SHG, Non-profit"
                value="">
            <small style="color: var(--text-secondary); display: block; margin-top: 5px;">* If filled, articles MUST
                match at least one context word to be relevant.</small>
        </div>

        <div class="form-group">
            <label for="links"><i class="fa-solid fa-link"></i> Paste Links (One per line)</label>
            <textarea id="links" rows="6" placeholder="https://example.com&#10;https://google.com"></textarea>
        </div>

        <div class="action-bar">
            <button id="analyzeBtn" onclick="analyzeLinks()">
                <span class="btn-text">Analyze Content</span>
                <i class="fa-solid fa-bolt"></i>
            </button>
            <!-- Loading Spinner -->
            <div id="loader" class="loader hidden"></div>
        </div>
    </section>

    <!-- Results Section -->
    <section id="resultsPanel" class="results-panel hidden">
        <div class="results-header">
            <h2>Analysis Report</h2>
            <button class="secondary-btn" onclick="downloadCSV()"><i class="fa-solid fa-download"></i> Export
                CSV</button>
        </div>

        <div class="table-wrapper">
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Status</th>
                        <th>URL</th>
                        <th>Count</th>
                        <th>Matches</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JS will populate this -->
                </tbody>
            </table>
        </div>
    </section>
</div>
{% endblock %}
