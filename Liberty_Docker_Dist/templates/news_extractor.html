{% extends "base.html" %}

{% block content %}
<div class="glass-panel">
    <header class="page-header">
        <div class="header-content">
            <h1>Google News <span>Extractor</span></h1>
            <p class="subtitle">Automated RSS Feed Intelligence</p>
        </div>
    </header>

    <!-- Input Section -->
    <section class="input-panel">
        <div class="form-group">
            <label for="newsTopic"><i class="fa-solid fa-search"></i> Topic / Organization</label>
            <input type="text" id="newsTopic" placeholder="e.g. PRADAN, Tata Trust, Agri-Tech" value="PRADAN">
        </div>

        <div class="form-row" style="display: flex; gap: 20px;">
            <div class="form-group" style="flex: 1;">
                <label for="startDate"><i class="fa-solid fa-calendar"></i> Start Date (After)</label>
                <input type="date" id="startDate">
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="endDate"><i class="fa-solid fa-calendar"></i> End Date (Before)</label>
                <input type="date" id="endDate">
            </div>
        </div>

        <div class="action-bar">
            <button id="fetchNewsBtn" onclick="fetchNews()">
                <span class="btn-text">Fetch Articles</span>
                <i class="fa-solid fa-cloud-arrow-down"></i>
            </button>
            <!-- Loading Spinner -->
            <div id="newsLoader" class="loader hidden"></div>
        </div>
    </section>

    <!-- Results Section -->
    <section id="newsResultsPanel" class="results-panel hidden">
        <div class="results-header">
            <h2>Found Articles <span id="articleCount" class="badge">0</span></h2>
            <button class="secondary-btn" onclick="downloadNewsCSV()"><i class="fa-solid fa-download"></i> Export
                CSV</button>
        </div>

        <div class="table-wrapper">
            <table id="newsTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Source</th>
                        <th>Title</th>
                        <th>Link</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JS will populate this -->
                </tbody>
            </table>
        </div>
    </section>
</div>
{% endblock %}
