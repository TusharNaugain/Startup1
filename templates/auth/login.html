{% extends "auth/_form_base.html" %}

{% block title %}Login · Multifind{% endblock %}

{% block content %}
<h1 style="text-align:center; margin: 0 0 6px;">Welcome back</h1>
<p class="subtitle">Enter your email to receive a one-time login code</p>

<form method="POST" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label for="email">Work Email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com"
               autocomplete="email" required>
    </div>

    <button type="submit" class="auth-btn">
        <span>Send OTP</span>
        &nbsp;→
    </button>
</form>

<div class="auth-footer" style="margin-top: 20px;">
    A 6-digit code will be emailed to you. It expires in 10 minutes.
</div>
{% endblock %}
