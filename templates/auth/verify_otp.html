{% extends "auth/_form_base.html" %}

{% block title %}Verify OTP · Multifind{% endblock %}

{% block content %}
<h1 style="text-align:center; margin: 0 0 6px;">Check your inbox</h1>
<p class="subtitle">
    We sent a 6-digit code to <strong style="color:#00d2ff;">{{ email }}</strong>
</p>

<form method="POST" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label for="otp">Enter OTP</label>
        <input type="text" id="otp" name="otp"
               placeholder="· · · · · ·"
               maxlength="6" autocomplete="one-time-code"
               inputmode="numeric" pattern="[0-9]{6}"
               style="letter-spacing: 0.4em; font-size: 1.4rem; text-align:center; font-weight:700;"
               required autofocus>
    </div>

    <button type="submit" class="auth-btn">Verify &amp; Login →</button>
</form>

<form method="POST" action="{{ url_for('auth.resend_otp') }}" style="margin-top:16px; text-align:center;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <p style="color:#64748b; font-size:13px; margin:0 0 8px;">
        Didn't receive it?
    </p>
    <button type="submit"
            style="background:none;border:none;color:#00d2ff;font-size:13px;cursor:pointer;font-family:inherit;padding:0;">
        Resend OTP
    </button>
    &nbsp;·&nbsp;
    <a href="{{ url_for('auth.login') }}" style="color:#64748b;font-size:13px;">Use a different email</a>
</form>
{% endblock %}
